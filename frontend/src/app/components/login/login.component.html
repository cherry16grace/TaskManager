<div class="login-container">
  <div class="login-box">
    <h1>{{ isLogin ? 'Login' : 'Register' }}</h1>
    
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div *ngIf="!isLogin" class="form-group">
        <label>Full Name</label>
        <input type="text" formControlName="name" placeholder="Enter your name" required>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="Enter your email" required>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" placeholder="Enter your password" required>
      </div>

      <div *ngIf="error" class="error-message">{{ error }}</div>

      <button type="submit" [disabled]="form.invalid || loading" class="btn-submit">
        {{ loading ? 'Loading...' : (isLogin ? 'Login' : 'Register') }}
      </button>
    </form>

    <p class="toggle-text">
      {{ isLogin ? "Don't have an account?" : 'Already have an account?' }}
      <a (click)="toggleMode()">{{ isLogin ? 'Register' : 'Login' }}</a>
    </p>
  </div>
</div>
